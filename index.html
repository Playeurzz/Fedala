<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyland - Panel Modération</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #fff; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .container { width: 100%; max-width: 900px; background: #0f0f0f; padding: 30px; border-radius: 4px; border: 1px solid #1a1a1a; position: relative; }
        h1 { color: #e60000; text-transform: uppercase; margin: 0; font-size: 2.5rem; text-shadow: 0 0 15px rgba(230, 0, 0, 0.5); }
        .author { font-size: 11px; color: #444; margin-bottom: 25px; letter-spacing: 1px; }
        .controls { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        input, select { background: #151515; border: 1px solid #333; color: #fff; padding: 12px 15px; font-family: inherit; font-size: 18px; outline: none; flex: 1; min-width: 200px; }
        input:focus, select:focus { border-color: #e60000; }
        .section-title { border-left: 4px solid #e60000; padding-left: 15px; margin: 30px 0 15px; text-transform: uppercase; color: #eee; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
        button { background: #1a1a1a; border: 1px solid #333; color: #bbb; padding: 14px; cursor: pointer; transition: all 0.2s; font-family: inherit; text-align: left; }
        button:hover { background: #e60000; color: #fff; box-shadow: 0 0 15px rgba(230, 0, 0, 0.3); border-color: #ff4d4d; transform: translateY(-2px); }
        .special { border-color: #e60000; color: #ff4d4d; }
        
        #output { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 15px 40px; border-radius: 4px; font-size: 1.2rem; display: none; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 100; white-space: nowrap; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Skyland Modération</h1>
    <div class="author">By Playeurz</div>

    <div class="controls">
        <input type="text" id="target" placeholder="ID JOUEUR">
        <select id="lvl">
            <optgroup label="Pédagogie (0-4 warns)">
                <option value="0">SAFE 0 (Averto Oral)</option>
                <option value="1">SAFE 1 (Warn)</option>
                <option value="2">SAFE 2 (Warn)</option>
                <option value="3">SAFE 3 (Warn)</option>
                <option value="4">SAFE 4 (Warn)</option>
            </optgroup>
            <optgroup label="Sanctions (5+ warns)">
                <option value="5" selected>NIVEAU 1</option>
                <option value="6">NIVEAU 2</option>
                <option value="7">NIVEAU 3</option>
                <option value="8">NIVEAU 4</option>
                <option value="9">NIVEAU 5</option>
            </optgroup>
        </select>
    </div>

    <div class="section-title">Comportement & Chat</div>
    <div class="grid">
        <button onclick="gen('HRP / Spam', [25, 40, 55, 70, 100])">HRP / Spam</button>
        <button onclick="gen('Refus de scène', [30, 45, 60, 75, 100])">Refus de scène</button>
        <button onclick="gen('Copbait', [15, 30, 45, 60, 100])">Copbait</button>
        <button onclick="gen('Freepunch', [15, 30, 45, 60, 100])">Freepunch</button>
    </div>

    <div class="section-title">Actions Illégales / RP</div>
    <div class="grid">
        <button onclick="gen('Freekill / RDM', [60, 75, 90, 105, 120])">Freekill / RDM</button>
        <button onclick="gen('Powergaming', [30, 45, 60, 75, 100])">Powergaming</button>
        <button onclick="gen('Metagaming', [20, 40, 60, 80, '12h'])">Metagaming</button>
        <button onclick="gen('No Fear / No Pain', [45, 60, 75, 100, '12h'])">No Fear / No Pain</button>
        <button onclick="gen('Fail RP', [20, 35, 50, 70, 100])">Fail RP</button>
        <button onclick="gen('Braquage Zone Safe', [45, 60, 80, 110, '12h'])">Braquage Zone Safe</button>
        <button onclick="gen('Tir sur Police/EMS', [90, 110, 130, 150, '12h'])">Tir sur Police/EMS</button>
        <button onclick="gen('Glitch / Exploit', [50, 75, 90, 120, '72h'])">Glitch / Exploit</button>
    </div>

    <div class="section-title">Cas Particuliers</div>
    <div class="grid">
        <button class="special" onclick="raw('jail', 200, 'Descente sans ticket')">Descente sans ticket (200m)</button>
        <button class="special" onclick="raw('jail', 260, 'ALT+F4 en scène')">ALT+F4 en scène (260m)</button>
    </div>

    <div id="output"></div>
</div>

<script>
    const out = document.querySelector('#output');
    
    // Sons (Bip succès et Buzzer erreur)
    const audioErr = new Audio('https://www.soundjay.com/buttons/sounds/button-10.mp3');
    const audioOk = new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3');

    const notify = (msg, type) => {
        out.innerText = msg;
        out.style.display = 'block';
        if(type === 'copy') {
            out.style.background = '#2ecc71';
            audioOk.play();
        } else {
            out.style.background = '#f39c12'; // Orange pour pédagogie
            audioErr.play();
        }
        setTimeout(() => { out.style.display = 'none'; }, 3000);
    };

    const gen = (label, rules) => {
        const target = document.querySelector('#target').value || 'ID_MANQUANT';
        const lvl = parseInt(document.querySelector('#lvl').value);
        
        if(lvl < 5) {
            return notify(`⚠️ PÉDAGOGIE : Avertissement oral pour ${label} !`, 'warn');
        }

        const i = lvl - 5;
        const val = rules[i];
        const cmd = (typeof val === 'string' && val.includes('h')) ? 'ban' : 'jail';
        const finalCmd = `/${cmd} ${target} ${val} ${label} (Niveau ${i + 1})`;
        
        navigator.clipboard.writeText(finalCmd);
        notify(`COMMANDE COPIÉE : ${finalCmd}`, 'copy');
    };

    const raw = (cmd, t, reason) => {
        const target = document.querySelector('#target').value || 'ID_MANQUANT';
        const finalCmd = `/${cmd} ${target} ${t} ${reason}`;
        navigator.clipboard.writeText(finalCmd);
        notify(`COMMANDE COPIÉE : ${finalCmd}`, 'copy');
    };
</script>

</body>
</html>
