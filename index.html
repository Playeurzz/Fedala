<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Skyland Modération - Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e60000; --bg: #050505; --card: #0f0f0f; --accent: #f39c12; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 950px; background: var(--card); padding: 30px; border-radius: 4px; border: 1px solid #1a1a1a; }
        
        /* Headers */
        h1 { color: var(--red); text-transform: uppercase; margin: 0; text-shadow: 0 0 15px rgba(230,0,0,0.5); }
        .author { font-size: 11px; color: #444; margin-bottom: 25px; }

        /* Inputs */
        .controls { display: grid; grid-template-columns: 2fr 1fr 2fr; gap: 15px; margin-bottom: 20px; }
        input, select, textarea { background: #151515; border: 1px solid #333; color: #fff; padding: 12px; font-family: inherit; font-size: 16px; outline: none; border-radius: 4px; }
        input:focus { border-color: var(--red); }
        textarea { grid-column: span 3; height: 50px; resize: none; border-style: dashed; }

        /* Grid & Buttons */
        .section-title { border-left: 4px solid var(--red); padding-left: 15px; margin: 30px 0 15px; text-transform: uppercase; }
        #rules-container { display: flex; flex-direction: column; gap: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
        button { background: #1a1a1a; border: 1px solid #333; color: #bbb; padding: 12px; cursor: pointer; transition: 0.2s; font-family: inherit; text-align: left; }
        button:hover { background: var(--red); color: #fff; border-color: #ff4d4d; transform: translateY(-2px); }

        /* History */
        .history { margin-top: 40px; border-top: 1px solid #222; padding-top: 20px; width: 100%; }
        .hist-item { background: #0a0a0a; padding: 10px; margin-bottom: 5px; border-radius: 4px; font-size: 14px; border-left: 3px solid #333; display: flex; justify-content: space-between; }
        
        /* Settings Modal */
        #settings-btn { position: fixed; bottom: 20px; right: 20px; background: #222; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; z-index: 1000; }
        #settings-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; padding: 50px; }
        #config-area { width: 100%; height: 70%; background: #111; color: #00ff00; font-family: monospace; padding: 20px; }

        /* Notifications */
        #notif { position: fixed; top: 20px; right: 20px; padding: 15px 30px; border-radius: 4px; display: none; animation: slideIn 0.3s; z-index: 3000; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>Skyland Modération <span style="font-size: 0.5em; vertical-align: middle; opacity: 0.6;">V2.0</span></h1>
    <div class="author">By Playeurz</div>

    <div class="controls">
        <input type="text" id="target" placeholder="ID JOUEUR">
        <select id="lvl">
            <optgroup label="Pédagogie">
                <option value="0">SAFE 0 (Oral)</option>
                <option value="1">SAFE 1 (Warn)</option>
                <option value="2">SAFE 2 (Warn)</option>
                <option value="3">SAFE 3 (Warn)</option>
                <option value="4">SAFE 4 (Warn)</option>
            </optgroup>
            <optgroup label="Sanctions">
                <option value="5" selected>NIV 1</option>
                <option value="6">NIV 2</option>
                <option value="7">NIV 3</option>
                <option value="8">NIV 4</option>
                <option value="9">NIV 5</option>
            </optgroup>
        </select>
        <textarea id="note" placeholder="Détails additionnels (Ex: Insultes parentales, a tué 3 personnes...)"></textarea>
    </div>

    <div id="rules-container"></div>

    <div class="history">
        <div class="section-title">Dernières Actions</div>
        <div id="hist-list"></div>
    </div>
</div>

<button id="settings-btn" onclick="toggleSettings()">⚙️</button>

<div id="settings-modal">
    <h2 style="color:white">Configuration des Sanctions (JSON)</h2>
    <textarea id="config-area"></textarea><br><br>
    <button onclick="saveConfig()" style="background: #2ecc71; color: white;">SAUVEGARDER & APPLIQUER</button>
    <button onclick="toggleSettings()" style="background: #e74c3c; color: white;">FERMER</button>
</div>

<div id="notif"></div>

<script>
    // --- CONFIGURATION PAR DÉFAUT ---
    const defaultConfig = {
        "Comportement": [
            { "n": "HRP / Spam", "t": [25, 40, 55, 70, 100] },
            { "n": "Refus de scène", "t": [30, 45, 60, 75, 100] },
            { "n": "Copbait", "t": [15, 30, 45, 60, 100] }
        ],
        "Violations Graves": [
            { "n": "Freekill / RDM", "t": [60, 75, 90, 105, 120] },
            { "n": "Metagaming", "t": [20, 40, 60, 80, "12h"] },
            { "n": "Glitch / Exploit", "t": [50, 75, 90, 120, "48h"] }
        ]
    };

    let rules = JSON.parse(localStorage.getItem('sky_config')) || defaultConfig;
    const audioErr = new Audio('https://www.soundjay.com/buttons/sounds/button-10.mp3');

    // --- LOGIQUE CORE ---
    const init = () => {
        const container = document.querySelector('#rules-container');
        container.innerHTML = '';
        document.querySelector('#target').value = localStorage.getItem('sky_last_id') || '';
        
        for (let cat in rules) {
            let section = `<div class="section-title">${cat}</div><div class="grid">`;
            rules[cat].forEach(r => {
                section += `<button onclick="process('${r.n}', ${JSON.stringify(r.t)})">${r.n}</button>`;
            });
            section += `</div>`;
            container.innerHTML += section;
        }
        updateHistory();
    };

    const process = (name, times) => {
        const target = document.querySelector('#target').value || 'ID_MANQUANT';
        const lvl = parseInt(document.querySelector('#lvl').value);
        const note = document.querySelector('#note').value;
        localStorage.setItem('sky_last_id', target);

        if (lvl < 5) {
            audioErr.play();
            return showNotif(`⚠️ PÉDAGOGIE : Avertissement oral pour ${name}`, '#f39c12');
        }

        const i = lvl - 5;
        const val = times[i];
        const cmd = (typeof val === 'string') ? 'ban' : 'jail';
        const final = `/${cmd} ${target} ${val} ${name} ${note ? '('+note+')' : ''} (Niv.${i+1})`;
        
        navigator.clipboard.writeText(final);
        showNotif(`COPIÉ : ${final}`, '#2ecc71');
        addHistory(final);
    };

    // --- UTILITAIRES ---
    const showNotif = (msg, bg) => {
        const n = document.querySelector('#notif');
        n.innerText = msg;
        n.style.background = bg;
        n.style.display = 'block';
        setTimeout(() => n.style.display = 'none', 3000);
    };

    const addHistory = (cmd) => {
        let hist = JSON.parse(localStorage.getItem('sky_hist')) || [];
        hist.unshift({ cmd, time: new Date().toLocaleTimeString() });
        localStorage.setItem('sky_hist', JSON.stringify(hist.slice(0, 5)));
        updateHistory();
    };

    const updateHistory = () => {
        const list = document.querySelector('#hist-list');
        const hist = JSON.parse(localStorage.getItem('sky_hist')) || [];
        list.innerHTML = hist.map(h => `<div class="hist-item"><span>${h.cmd}</span><span style="color:#666">${h.time}</span></div>`).join('');
    };

    // --- CONFIG MODAL ---
    const toggleSettings = () => {
        const m = document.querySelector('#settings-modal');
        document.querySelector('#config-area').value = JSON.stringify(rules, null, 4);
        m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    };

    const saveConfig = () => {
        try {
            rules = JSON.parse(document.querySelector('#config-area').value);
            localStorage.setItem('sky_config', JSON.stringify(rules));
            init();
            toggleSettings();
            showNotif("Configuration enregistrée !", "#2ecc71");
        } catch(e) { alert("Erreur dans le JSON ! Vérifie les virgules."); }
    };

    init();
</script>
</body>
</html>
