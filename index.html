<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETWORK CRIMINEL - DATABASE</title>
    <style>
        :root {
            --bg: #050505;
            --card-bg: #111111;
            --accent: #00ff88; /* Vert Néon */
            --accent-glow: rgba(0, 255, 136, 0.3);
            --text: #ffffff;
            --border: #222;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Effet de grain en fond */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1;
            z-index: -1;
        }

        header {
            text-align: center;
            padding: 50px 20px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(to bottom, #001a0d, var(--bg));
        }

        h1 {
            margin: 0;
            font-size: 2.5em;
            letter-spacing: 8px;
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent-glow);
            text-transform: uppercase;
        }

        nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            padding: 20px;
            position: sticky;
            top: 0;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        nav a {
            text-decoration: none;
            color: #888;
            background: #000;
            padding: 10px 20px;
            border: 1px solid var(--border);
            border-radius: 2px;
            font-size: 0.8em;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.4s ease;
        }

        nav a:hover, nav a:focus {
            color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
            transform: translateY(-2px);
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .drug-section {
            display: none;
            animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .drug-section:target { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; filter: blur(10px); }
            to { opacity: 1; filter: blur(0); }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            position: relative;
            transition: 0.3s;
        }

        .card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
        }

        .card h3 {
            padding: 20px;
            margin: 0;
            font-size: 1em;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: #000;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
        }

        .img-box {
            position: relative;
            cursor: pointer;
            height: 300px;
            overflow: hidden;
            background: #000;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            transition: 0.5s;
        }

        .img-box:hover img {
            opacity: 1;
            transform: scale(1.05);
        }

        .img-box::after {
            content: "SCANNER...";
            position: absolute;
            bottom: 10px; right: 10px;
            font-size: 0.7em;
            color: var(--accent);
            opacity: 0;
            transition: 0.3s;
        }

        .img-box:hover::after { opacity: 1; }

        /* LIGHTBOX SYSTEM */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            justify-content: center; align-items: center;
            cursor: zoom-out;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
            border: 1px solid var(--accent);
            box-shadow: 0 0 50px var(--accent-glow);
        }

        footer {
            text-align: center;
            padding: 60px;
            color: #333;
            font-size: 0.7em;
            letter-spacing: 4px;
        }
    </style>
</head>
